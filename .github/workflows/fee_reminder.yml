name: S.Baruah Academy Automation Mainframe

on:
  schedule:
    # Triggers precisely at 03:00 UTC (8:30 AM Indian Standard Time) every morning
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows manual trigger directly from your GitHub profile UI

jobs:
  execute-automation-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Cloud Virtual File Tree
        uses: actions/checkout@v4

      - name: Deploy Secure Isolated Python Workspace
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build Web Request Middleware Dependencies
        run: pip install requests

      - name: Initialize Fee Monitoring Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python reminder.py
