<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuition Application</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 30px;
            padding-bottom: 20px;
        }

        h2 { color: #2c3e50; margin-bottom: 5px; }
        
        .info-section {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        /* Form Styling */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* Important for layout */
            font-size: 16px;
        }

        button {
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background: #0056b3; }

        /* QR Code Styling */
        .payment-box {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            border: 2px dashed #007bff;
            border-radius: 8px;
        }

        .qr-img {
            max-width: 200px;
            margin: 15px 0;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Tuition Application Form</h2>
        <p>Fill out the details below to enroll.</p>
    </header>

    <div class="info-section">
        <strong>Tutor:</strong> Sajal Baruah<br>
        <strong>Subjects:</strong> Physics, Math, Science<br>
        <strong>Phone:</strong> +91 6001950614
    </div>

    <form action="https://formsubmit.co/sajalbaruah51@gmail.com" method="POST">
        <div class="form-group">
            <label>Student Name</label>
            <input type="text" name="name" placeholder="Enter Full Name" required>
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="tel" name="phone" placeholder="WhatsApp Number" required>
        </div>

        <div class="form-group">
            <label>Select Subject</label>
            <select name="subject" required>
                <option value="Physics">Physics</option>
                <option value="Maths">Mathematics</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Message/Notes</label>
            <textarea name="message" rows="3" placeholder="Tell me about your requirements..."></textarea>
        </div>

        <button type="submit">Submit Application</button>
    </form>

    <div class="payment-box">
        <h3>Monthly Fee Payment</h3>
        <p>Scan to pay via UPI</p>
        <img src="qr.png" alt="Payment QR" class="qr-img">
        <p><strong>UPI ID:</strong>sajalbaruah0614@upi </p>
    </div>
</div>

</body>
</html>
