<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | S.Baruah Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo"><i class="fas fa-atom"></i> S.BARUAH</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="courses.html">Courses</a>
            <a href="registration.html">Enroll</a>
            <a href="login.html" class="btn" style="padding: 8px 15px;">Login</a>
        </div>
    </nav>

    <div class="container" style="max-width: 450px; margin-top: 150px;">
        <div class="glass" style="text-align: center;">
            <i class="fas fa-user-lock fa-3x" style="color: var(--accent); margin-bottom: 20px;"></i>
            <h2>Student Portal</h2>
            <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 20px;">Enter your ID for Dashboard access</p>
            
            <input type="password" id="portal-id" placeholder="Enter Student ID" style="text-align: center;">
            
            <button class="btn" style="width: 100%;" onclick="forceLogin()">Enter Dashboard</button>
        </div>
    </div>

    <script>
        function forceLogin() {
            const inputField = document.getElementById('portal-id');
            // .toLowerCase() makes it so SAJAL, sajal, and SaJaL all work perfectly
            const userInput = inputField.value.trim().toLowerCase(); 
            
            // We check against the all-lowercase version
            const correctID = "sajalbaruah2005_10_9";

            if (userInput === correctID) {
                alert("Login Successful! Redirecting...");
                window.location.href = "dashboard.html";
            } else {
                // This will tell you EXACTLY what the system thinks you typed
                alert("Access Denied. You typed: '" + inputField.value + "' - Please check for typos.");
            }
        }
    </script>
</body>
</html>
