<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll Now | Sajal Baruah Academy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="logo">S.BARUAH</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="courses.html">Fees</a>
            <a href="registration.html">Enroll</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px;">
        <div class="glass">
            <h2 style="text-align: center; margin-bottom: 20px;">Admission Form 2026</h2>
            <form action="https://formsubmit.co/sajalbaruah51@gmail.com" method="POST">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_template" value="table">
                
                <label>Student Name</label>
                <input type="text" name="Student_Name" placeholder="Full Name" required>
                
                <label>WhatsApp Number</label>
                <input type="tel" name="Contact" placeholder="+91" required>
                
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;">
                        <label>Class</label>
                        <select name="Class">
                            <option>Class 8</option>
                            <option>Class 9</option>
                            <option>Class 10</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Medium</label>
                        <select name="Medium">
                            <option>Assamese</option>
                            <option>English</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 20px;">Submit Enrollment</button>
            </form>
        </div>
    </div>
</body>
</html>
