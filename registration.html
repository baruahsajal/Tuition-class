<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll | S.Baruah Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dynamic-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>

    <nav>
        <div class="logo"><i class="fas fa-atom"></i> S.BARUAH</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="courses.html">Courses</a>
            <a href="registration.html" style="color:var(--accent)">Enroll</a>
            <a href="login.html" class="btn" style="padding: 8px 15px;">Login</a>
        </div>
    </nav>

    <div class="container" style="max-width: 600px; margin-top: 120px;">
        <div class="glass">
            <h2 class="text-center mb-20"><i class="fas fa-user-plus icon-accent"></i> Admission Form 2026</h2>
            <form action="https://formsubmit.co/sajalbaruah51@gmail.com" method="POST" class="mt-30">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_subject" value="New Student Enrollment!">
                <input type="hidden" name="_template" value="table">

                <label style="color:#94a3b8; font-size:0.9rem;">Student Name</label>
                <input type="text" name="Student_Name" placeholder="Full Name" required>

                <label style="color:#94a3b8; font-size:0.9rem;">WhatsApp Number</label>
                <input type="tel" name="Contact" placeholder="+91" required>

                <div style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label style="color:#94a3b8; font-size:0.9rem;">Class (Math & Science)</label>
                        <select name="Class">
                            <option>Class 8</option>
                            <option>Class 9</option>
                            <option>Class 10</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label style="color:#94a3b8; font-size:0.9rem;">Medium</label>
                        <select name="Medium">
                            <option>Assamese</option>
                            <option>English</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn mt-20" style="width: 100%;">Submit Enrollment</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
